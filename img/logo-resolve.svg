<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <!-- Background Border Gradient (Rainbow) -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38E8AB" />
      <stop offset="33%" stop-color="#3ACBED" />
      <stop offset="66%" stop-color="#FF3A71" />
      <stop offset="100%" stop-color="#FFCC33" />
    </linearGradient>

    <!-- Top Petal Gradient (Cyan -> Dark Blue) -->
    <linearGradient id="gradTop" x1="0%" y1="20%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4BEEFA"/>
      <stop offset="100%" stop-color="#2366CE"/>
    </linearGradient>
    
    <!-- Bottom-Left Petal Gradient (Yellow -> Green) -->
    <linearGradient id="gradLeft" x1="0%" y1="20%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F2FB54"/>
      <stop offset="100%" stop-color="#6DB11C"/>
    </linearGradient>
    
    <!-- Bottom-Right Petal Gradient (Pink -> Dark Red) -->
    <linearGradient id="gradRight" x1="0%" y1="20%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FF828F"/>
      <stop offset="100%" stop-color="#C5161D"/>
    </linearGradient>
  </defs>

  <!-- Base App Icon -->
  <rect x="1" y="1" width="126" height="126" fill="#1C2636" rx="28"/>
  <rect x="3" y="3" width="122" height="122" fill="none" stroke="url(#borderGrad)" stroke-width="4" rx="26"/>

  <g transform="translate(0, 4)">
      <!-- Top Petal -->
      <path d="M 48 30 A 16 16 0 0 1 80 30 C 80 44 68 56 64 57 C 60 56 48 44 48 30 Z" fill="url(#gradTop)"/>
      <path d="M 54 28 A 10 8 0 0 1 74 28 C 74 34 68 39 64 40 C 60 39 54 34 54 28 Z" fill="rgba(255,255,255,0.45)"/>

      <!-- Bottom-Left Petal -->
      <g transform="rotate(-120, 64, 60)">
        <path d="M 48 30 A 16 16 0 0 1 80 30 C 80 44 68 56 64 57 C 60 56 48 44 48 30 Z" fill="url(#gradLeft)"/>
        <path d="M 54 28 A 10 8 0 0 1 74 28 C 74 34 68 39 64 40 C 60 39 54 34 54 28 Z" fill="rgba(255,255,255,0.4)"/>
      </g>

      <!-- Bottom-Right Petal -->
      <g transform="rotate(120, 64, 60)">
        <path d="M 48 30 A 16 16 0 0 1 80 30 C 80 44 68 56 64 57 C 60 56 48 44 48 30 Z" fill="url(#gradRight)"/>
        <path d="M 54 28 A 10 8 0 0 1 74 28 C 74 34 68 39 64 40 C 60 39 54 34 54 28 Z" fill="rgba(255,255,255,0.4)"/>
      </g>
  </g>
</svg>